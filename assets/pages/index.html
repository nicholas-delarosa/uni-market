<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UNI-Market</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Logo -->

    <div class="logo">

        <i class="fa-solid fa-scissors"></i>

        <span>UNI-Market</span>

    </div>



    <!-- Tarjeta -->

    <div class="card">

        <!-- Tabs -->

        <div class="tabs">

            <button id="loginTab" class="active">

                Iniciar sesión

            </button>

            <button id="registerTab">

                Crear cuenta

            </button>

        </div>



        <!-- ========================= -->
        <!-- LOGIN -->
        <!-- ========================= -->

        <div id="loginSection">

            <h1>

                Bienvenido de nuevo

            </h1>

            <p class="subtitle">

                Ingresa tus datos para continuar.

            </p>

            <form>

                <label>

                    Correo electrónico

                </label>

                <input
                    type="email"
                    placeholder="manuel@riwi.io"
                >

                <label>

                    Contraseña

                </label>

                <div class="password">

                    <input
                        type="password"
                        placeholder="********"
                    >

                    <i class="fa-regular fa-eye"></i>

                </div>

                <div class="options">

                    <label class="remember">

                        <input type="checkbox">

                        Recordarme

                    </label>

                    <a href="#">

                        ¿Olvidaste tu contraseña?

                    </a>

                </div>

                <button class="btn">

                    Iniciar sesión

                </button>

            </form>

            <p class="bottomText">

                ¿No tienes una cuenta?

                <a href="#" id="goRegister">

                    Regístrate aquí

                </a>

            </p>

        </div>



        <!-- ========================= -->
        <!-- REGISTRO -->
        <!-- ========================= -->

        <div id="registerSection" class="hidden">

            <h1>

                Crear cuenta

            </h1>

            <p class="subtitle">

                Completa los datos para comenzar.

            </p>

            <form>

                <label>

                    Nombre completo

                </label>

                <input
                    type="text"
                    placeholder="Juan Pérez"
                >

                <label>

                    Correo electrónico

                </label>

                <input
                    type="email"
                    placeholder="correo@universidad.edu"
                >

                <label>

                    Universidad

                </label>

                <select>

                    <option>

                        Selecciona tu universidad

                    </option>

                    <option>

                        Universidad de la Costa

                    </option>

                    <option>

                        Universidad del Norte

                    </option>

                    <option>

                        Universidad Simón Bolívar

                    </option>

                </select>

                <label>

                    Contraseña

                </label>

                <div class="password">

                    <input
                        type="password"
                        placeholder="********"
                    >

                    <i class="fa-regular fa-eye"></i>

                </div>

                <label>

                    Confirmar contraseña

                </label>

                <div class="password">

                    <input
                        type="password"
                        placeholder="********"
                    >

                    <i class="fa-regular fa-eye"></i>

                </div>

                <button class="btn">

                    Crear cuenta

                </button>

            </form>

            <p class="bottomText">

                ¿Ya tienes una cuenta?

                <a href="#" id="goLogin">

                    Inicia sesión

                </a>

            </p>

        </div>

    </div>



    <!-- Footer -->

    <footer>

        © 2026 UNI-Market — El mercado de tu campus.

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
